<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#334155" />
    <script>
      (function(){
        try {
          var c = localStorage.getItem('axis_cor');
          if (!c || !/^#[0-9a-fA-F]{6}$/.test(c)) return;
          var r=parseInt(c.slice(1,3),16), g=parseInt(c.slice(3,5),16), b=parseInt(c.slice(5,7),16);
          var h=function(x){x=Math.max(0,Math.min(255,Math.round(x)));return x.toString(16).padStart(2,'0');};
          var s=document.documentElement.style;
          s.setProperty('--primary', c);
          s.setProperty('--primary-dark', '#'+h(r*0.82)+h(g*0.82)+h(b*0.82));
          s.setProperty('--primary-light', '#'+h(r+(255-r)*0.9)+h(g+(255-g)*0.9)+h(b+(255-b)*0.9));
          s.setProperty('--primary-mid', 'rgba('+r+','+g+','+b+',0.15)');
          var m=document.querySelector('meta[name=theme-color]'); if(m) m.content=c;
        } catch(e){}
      })();
    </script>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AXIS" />
    <link rel="icon" type="image/png" href="/axis-192.png" />
    <link rel="apple-touch-icon" href="/axis-apple.png" />
    <meta name="description" content="AXIS Eventos - Gestao de Eventos" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=swap" rel="stylesheet" />
    <title>AXIS Eventos</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
